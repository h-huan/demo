name: Test GitHub Actions

on:
  push:
    branches: [ main, master, test-actions ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:  # 允许手动触发

jobs:
  # 测试 1: 基础环境检查
  hello-world:
    runs-on: ubuntu-latest
    
    steps:
    - name: Check out repository
      uses: actions/checkout@v4
    
    - name: Print GitHub info
      run: |
        echo "✅ Hello from GitHub Actions!"
        echo "📦 Repository: ${{ github.repository }}"
        echo "🔖 Branch: ${{ github.ref_name }}"
        echo "👤 Actor: ${{ github.actor }}"
        echo "📝 Event: ${{ github.event_name }}"
        echo "🔨 Workflow: ${{ github.workflow }}"
    
    - name: Show environment variables
      run: |
        echo "🖥️  Runner OS: ${{ runner.os }}"
        echo "🏠 Runner Home: $RUNNER_HOME"
    
    - name: Create test file
      run: |
        echo "Test run at $(date)" > test-output.txt
        echo "Generated by: ${{ github.actor }}" >> test-output.txt
    
    - name: Upload test output
      uses: actions/upload-artifact@v4
      with:
        name: test-results
        path: test-output.txt
        retention-days: 7

  # 测试 2: Node.js 环境
  nodejs-test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
    
    - name: Check Node.js version
      run: node --version
    
    - name: Check npm version
      run: npm --version
    
    - name: Create and test package
      run: |
        mkdir test-project
        cd test-project
        npm init -y
        npm install lodash
        node -e "const _ = require('lodash'); console.log('✅ Lodash works:', _.chunk([1,2,3,4,5], 2))"

  # 测试 3: 矩阵测试（修复版本检查）
  matrix-test:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        node-version: [18.x, 20.x, 22.x]
    
    name: Node ${{ matrix.node-version }} Test
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
    
    - name: Test Node version
      run: |
        NODE_VERSION=$(node --version)
        echo "✅ Running on Node.js $NODE_VERSION"
        echo "✅ Matrix test for ${{ matrix.node-version }} completed!"

  # 测试 4: 成功总结
  summary:
    runs-on: ubuntu-latest
    needs: [hello-world, nodejs-test, matrix-test]
    if: always()
    
    steps:
    - name: Print summary
      run: |
        echo "╔════════════════════════════════════════╗"
        echo "║   GitHub Actions Test Complete!       ║"
        echo "╠════════════════════════════════════════╣"
        echo "║ ✅ All jobs executed successfully     ║"
        echo "║ 📦 Repository: ${{ github.repository }}"
        echo "║ 🔖 Branch: ${{ github.ref_name }}"
        echo "║ 🕐 Completed: $(date)"
        echo "╚════════════════════════════════════════╝"
